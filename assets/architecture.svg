<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" font-family="DejaVu Sans, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B132E"/>
      <stop offset="1" stop-color="#122C5C"/>
    </linearGradient>
    <linearGradient id="api" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1668C7"/>
      <stop offset="1" stop-color="#0E4C99"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#22D3EE"/>
    </marker>
    <marker id="arrW" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7FA8D8"/>
    </marker>
  </defs>

  <rect width="1280" height="820" fill="url(#bg)"/>

  <!-- Title -->
  <text x="48" y="58" fill="#FFFFFF" font-size="34" font-weight="bold">SaafHawa — System Architecture</text>
  <text x="48" y="88" fill="#22D3EE" font-size="18">Air-quality data → a per-household, bilingual decision. Offline-safe.</text>

  <!-- Column headers -->
  <text x="170" y="140" fill="#9FB6D6" font-size="16" text-anchor="middle" letter-spacing="2">CLIENTS</text>
  <text x="640" y="140" fill="#9FB6D6" font-size="16" text-anchor="middle" letter-spacing="2">BACKEND  ·  FastAPI</text>
  <text x="1095" y="140" fill="#9FB6D6" font-size="16" text-anchor="middle" letter-spacing="2">DATA &amp; AI</text>

  <!-- CLIENTS -->
  <g>
    <rect x="40" y="180" width="260" height="110" rx="16" fill="#16233F" stroke="#2E4A78" stroke-width="2"/>
    <text x="170" y="226" fill="#FFFFFF" font-size="22" font-weight="bold" text-anchor="middle">Web Frontend</text>
    <text x="170" y="256" fill="#AFC3E0" font-size="15" text-anchor="middle">HTML / Tailwind · EN + Urdu</text>
    <text x="170" y="278" fill="#7FA8D8" font-size="13" text-anchor="middle">household profile · verdict · chat</text>

    <rect x="40" y="320" width="260" height="100" rx="16" fill="#16233F" stroke="#2E4A78" stroke-width="2"/>
    <text x="170" y="362" fill="#FFFFFF" font-size="22" font-weight="bold" text-anchor="middle">Telegram Bot</text>
    <text x="170" y="392" fill="#AFC3E0" font-size="15" text-anchor="middle">daily plan · works on any phone</text>
  </g>

  <!-- BACKEND API -->
  <rect x="430" y="175" width="420" height="305" rx="20" fill="url(#api)" stroke="#2DD4BF" stroke-width="2"/>
  <text x="640" y="212" fill="#FFFFFF" font-size="20" font-weight="bold" text-anchor="middle">FastAPI service</text>

  <g font-size="17" font-weight="bold">
    <rect x="460" y="232" width="360" height="58" rx="12" fill="#0E2A52" stroke="#22D3EE" stroke-width="1.5"/>
    <text x="478" y="260" fill="#22D3EE">GET /aqi</text>
    <text x="478" y="282" fill="#AFC3E0" font-size="13" font-weight="normal">live AQI + honest health category</text>

    <rect x="460" y="300" width="360" height="58" rx="12" fill="#0E2A52" stroke="#2DD4BF" stroke-width="1.5"/>
    <text x="478" y="328" fill="#2DD4BF">POST /plan</text>
    <text x="478" y="350" fill="#AFC3E0" font-size="13" font-weight="normal">verdict + 3–4 steps + why, per household</text>

    <rect x="460" y="368" width="360" height="58" rx="12" fill="#0E2A52" stroke="#F4A23B" stroke-width="1.5"/>
    <text x="478" y="396" fill="#F4A23B">POST /ask</text>
    <text x="478" y="418" fill="#AFC3E0" font-size="13" font-weight="normal">ask-anything, grounded in air + household</text>
  </g>
  <text x="640" y="462" fill="#CFE0F5" font-size="13" text-anchor="middle">CORS · Pydantic contract · retry/backoff on 429</text>

  <!-- DATA & AI -->
  <g>
    <rect x="960" y="180" width="280" height="92" rx="16" fill="#13352B" stroke="#22C55E" stroke-width="2"/>
    <text x="1100" y="216" fill="#FFFFFF" font-size="19" font-weight="bold" text-anchor="middle">WAQI / aqicn</text>
    <text x="1100" y="244" fill="#A9D8BC" font-size="14" text-anchor="middle">station AQI · Lahore &amp; Karachi</text>

    <rect x="960" y="286" width="280" height="78" rx="16" fill="#2A2233" stroke="#8B6FB0" stroke-width="2"/>
    <text x="1100" y="318" fill="#FFFFFF" font-size="16" font-weight="bold" text-anchor="middle">OpenWeather (fallback)</text>
    <text x="1100" y="342" fill="#C9B9DD" font-size="13" text-anchor="middle">secondary air source</text>

    <rect x="960" y="378" width="280" height="104" rx="16" fill="#3A2A1A" stroke="#F4A23B" stroke-width="2"/>
    <text x="1100" y="414" fill="#FFFFFF" font-size="19" font-weight="bold" text-anchor="middle">Groq · Llama 3.3 70B</text>
    <text x="1100" y="440" fill="#F2C893" font-size="14" text-anchor="middle">interpretation + bilingual JSON</text>
    <text x="1100" y="462" fill="#C9A36B" font-size="13" text-anchor="middle">deterministic fallback if down</text>

    <rect x="960" y="500" width="280" height="78" rx="16" fill="#16233F" stroke="#2E4A78" stroke-width="2"/>
    <text x="1100" y="532" fill="#FFFFFF" font-size="18" font-weight="bold" text-anchor="middle">SQLite cache</text>
    <text x="1100" y="556" fill="#AFC3E0" font-size="13" text-anchor="middle">AQI + plan TTL · last-good store</text>
  </g>

  <!-- Arrows clients -> api -->
  <line x1="300" y1="235" x2="428" y2="280" stroke="#22D3EE" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="300" y1="370" x2="428" y2="360" stroke="#22D3EE" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Arrows api -> data -->
  <line x1="850" y1="258" x2="958" y2="226" stroke="#7FA8D8" stroke-width="2.5" marker-end="url(#arrW)"/>
  <line x1="850" y1="262" x2="958" y2="320" stroke="#7FA8D8" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#arrW)"/>
  <line x1="850" y1="394" x2="958" y2="420" stroke="#7FA8D8" stroke-width="2.5" marker-end="url(#arrW)"/>
  <line x1="850" y1="430" x2="958" y2="528" stroke="#7FA8D8" stroke-width="2.5" marker-end="url(#arrW)"/>

  <!-- Verdict JSON contract callout -->
  <rect x="40" y="470" width="380" height="300" rx="18" fill="#0E2A52" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="62" y="504" fill="#22D3EE" font-size="16" font-weight="bold">Frozen JSON contract  (models.py)</text>
  <text x="62" y="500" fill="#22D3EE" font-size="16"></text>
  <g font-family="DejaVu Sans Mono, monospace" font-size="14" fill="#CFE0F5">
    <text x="62" y="536">{</text>
    <text x="76" y="558">"aqi": 168,</text>
    <text x="76" y="580">"category": "Unhealthy",</text>
    <text x="76" y="602">"verdict_en": "...",  "verdict_ur": "...",</text>
    <text x="76" y="624">"steps_en": [...],     "steps_ur": [...],</text>
    <text x="76" y="646">"why_en": "...",       "why_ur": "...",</text>
    <text x="76" y="668">"source": "ai" | "fallback"</text>
    <text x="62" y="690">}</text>
  </g>
  <text x="62" y="726" fill="#7FA8D8" font-size="13">Locked Day 1 → frontend &amp; backend evolve</text>
  <text x="62" y="746" fill="#7FA8D8" font-size="13">independently without breaking each other.</text>

  <!-- Offline-safe banner -->
  <rect x="460" y="510" width="390" height="64" rx="14" fill="#13352B" stroke="#22C55E" stroke-width="2"/>
  <text x="655" y="540" fill="#FFFFFF" font-size="16" font-weight="bold" text-anchor="middle">Offline-safe path</text>
  <text x="655" y="562" fill="#A9D8BC" font-size="13" text-anchor="middle">last-good cache + rule-based plan = guidance always loads</text>
</svg>
